services:
  jenkins-docker:
    image: docker:dind
    container_name: jenkins-docker
    privileged: true

    environment:
      - DOCKER_TLS_CERTDIR=/certs

    # 🔥 DNS applicato correttamente al daemon Docker
    dns:
      - 8.8.8.8
      - 1.1.1.1

    command: --storage-driver overlay2

    volumes:
      - jenkins-docker-certs:/certs/client
      - jenkins-data:/var/jenkins_home

    ports:
      - "2376:2376"

    networks:
      jenkins:
        aliases:
          - docker

  my-jenkins:
    image: my-jenkins
    container_name: my-jenkins
    restart: on-failure

    environment:
      - DOCKER_HOST=tcp://docker:2376
      - DOCKER_CERT_PATH=/certs/client
      - DOCKER_TLS_VERIFY=1
      - JAVA_OPTS=-Dhudson.model.DirectoryBrowserSupport.CSP="default-src 'self' 'unsafe-inline';"

    volumes:
      - jenkins-data:/var/jenkins_home
      - jenkins-docker-certs:/certs/client:ro

    ports:
      - "9000:8080"
      - "50000:50000"

    networks:
      - jenkins

networks:
  jenkins:
    driver: bridge

volumes:
  jenkins-docker-certs:
  jenkins-data: